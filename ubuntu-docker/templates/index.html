<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ollama Docker Container</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            margin: 0;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
        }
        .card {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            margin-bottom: 20px;
        }
        h1 { color: #333; margin-bottom: 10px; }
        p { color: #666; }
        .status {
            display: inline-block;
            padding: 10px 20px;
            border-radius: 20px;
            font-weight: bold;
            margin: 10px 0;
        }
        .status.healthy { background: #4CAF50; color: white; }
        .status.unhealthy { background: #f44336; color: white; }
        select, textarea, button {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
        }
        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            cursor: pointer;
        }
        .output {
            background: #f5f5f5;
            padding: 15px;
            border-radius: 8px;
            min-height: 100px;
            white-space: pre-wrap;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <h1>🐳 Ollama Docker Container</h1>
            <p>Running Ollama LLM in Docker container</p>
            <div id="status" class="status">Checking...</div>
        </div>
        
        <div class="card">
            <h2>💬 Chat</h2>
            <select id="model">
                <option value="llama3.2">Llama 3.2</option>
                <option value="mistral">Mistral 7B</option>
            </select>
            <textarea id="prompt" placeholder="Enter your prompt..."></textarea>
            <button onclick="generate()">Generate</button>
            <div id="output" class="output"></div>
        </div>
    </div>
    
    <script>
        async function checkHealth() {
            try {
                const response = await fetch('/health');
                const data = await response.json();
                const statusEl = document.getElementById('status');
                if (data.status === 'healthy') {
                    statusEl.textContent = '✓ Healthy';
                    statusEl.className = 'status healthy';
                } else {
                    statusEl.textContent = '✗ Unhealthy';
                    statusEl.className = 'status unhealthy';
                }
            } catch (error) {
                document.getElementById('status').textContent = '✗ Error';
                document.getElementById('status').className = 'status unhealthy';
            }
        }
        
        async function generate() {
            const model = document.getElementById('model').value;
            const prompt = document.getElementById('prompt').value;
            const outputEl = document.getElementById('output');
            
            if (!prompt) {
                outputEl.textContent = 'Please enter a prompt';
                return;
            }
            
            outputEl.textContent = 'Generating...';
            
            try {
                const response = await fetch('/api/generate', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ model, prompt, stream: false })
                });
                const data = await response.json();
                outputEl.textContent = data.response || data.error || 'No response';
            } catch (error) {
                outputEl.textContent = 'Error: ' + error.message;
            }
        }
        
        checkHealth();
        setInterval(checkHealth, 30000);
    </script>
</body>
</html>
